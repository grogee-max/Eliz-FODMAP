<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FODMAP Guide">
<title>Elizabeth's FODMAP Guide</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:Avenir,"Trebuchet MS",system-ui,sans-serif;background:#fff;color:#1e293b}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.hdr{background:linear-gradient(135deg,#4f46e5,#7c3aed);padding:20px 16px 16px;color:#fff;flex-shrink:0}
.hdr-sub{font-size:13px;font-weight:600;opacity:.8;letter-spacing:1px;text-transform:uppercase}
.hdr-title{font-size:24px;font-weight:900;letter-spacing:-.5px}
.hdr-count{font-size:12px;opacity:.7;margin-top:2px}
.search-wrap{margin-top:12px;position:relative}
.search-wrap input{width:100%;padding:10px 14px 10px 36px;border-radius:10px;border:none;font-size:15px;background:rgba(255,255,255,.15);color:#fff;outline:none;font-family:inherit;box-sizing:border-box}
.search-wrap input::placeholder{color:rgba(255,255,255,.5)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;opacity:.6}
.cat-bar{padding:8px 16px;border-bottom:1px solid #f1f5f9;background:#fafafe;flex-shrink:0}
.cat-toggle{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:600;color:#475569;cursor:pointer;width:100%;text-align:left;display:flex;justify-content:space-between;align-items:center;font-family:inherit}
.cat-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;padding-bottom:4px}
.cat-pill{padding:5px 10px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid #e2e8f0;background:#fff;color:#64748b}
.cat-pill.on{border:2px solid #6366f1;background:#eef2ff;color:#4f46e5}
.filters{display:flex;gap:6px;padding:8px 16px;border-bottom:1px solid #f1f5f9;flex-shrink:0}
.fbtn{flex:1;padding:6px 0;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;border:1px solid #e2e8f0;background:#fff;color:#94a3b8}
.fbtn.on{border-width:2px}
.list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.row{display:flex;align-items:center;width:100%;padding:12px 16px;border:none;border-bottom:1px solid #f8fafc;cursor:pointer;text-align:left;gap:12px;font-family:inherit;background:#fff}
.row:nth-child(even){background:#fafafe}
.dot{width:10px;height:10px;border-radius:5px;flex-shrink:0}
.row-name{font-size:14px;font-weight:600;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-serve{font-size:11px;color:#94a3b8;margin-top:1px}
.row-arr{font-size:10px;color:#cbd5e1}
.footer{padding:10px 16px;border-top:1px solid #f1f5f9;background:#fafafe;text-align:center;flex-shrink:0}
.footer div{font-size:10px;color:#94a3b8}
.detail{padding:16px;overflow-y:auto;flex:1}
.back-btn{background:none;border:none;color:#6366f1;font-size:15px;font-weight:600;cursor:pointer;padding:8px 0;display:flex;align-items:center;gap:4px;font-family:inherit}
.detail-card{border-radius:16px;padding:20px;margin-top:8px}
.detail-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.detail-emoji{font-size:28px}
.detail-name{font-size:20px;font-weight:800;color:#1e293b}
.detail-rating{font-size:13px;font-weight:700;margin-top:2px}
.detail-cat{font-size:13px;color:#64748b;margin-bottom:4px}
.detail-serve{font-size:14px;color:#334155;margin-top:8px}
.detail-notes{font-size:13px;color:#64748b;margin-top:6px;font-style:italic}
.breakdown{margin-top:20px;background:#f8fafc;border-radius:12px;padding:16px;border:1px solid #e2e8f0}
.breakdown-title{font-size:14px;font-weight:700;color:#334155;margin-bottom:12px}
.brow{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.brow+.brow{border-top:1px solid #f1f5f9}
.brow-label{font-size:13px;color:#475569;font-weight:500}
.dots{display:flex;gap:3px;align-items:center}
.dots span{width:9px;height:9px;border-radius:3px;background:#e2e8f0}
.dots span.on1{background:#d97706}
.dots span.on2,.dots span.on3{background:#dc2626}
.disclaimer{margin-top:16px;padding:12px;background:#eff6ff;border-radius:10px;border:1px solid #bfdbfe}
.disclaimer b{font-size:11px;color:#3b82f6;font-weight:600;display:block;margin-bottom:4px}
.disclaimer p{font-size:11px;color:#64748b;line-height:1.5;margin:0}
.empty{padding:40px;text-align:center;color:#94a3b8;font-size:14px}
.hidden{display:none!important}
</style>
</head>

var CM={V:"Vegetables",F:"Fruits",G:"Grains",P:"Protein",L:"Legumes",D:"Dairy",N:"Nuts & Seeds",C:"Condiments",S:"Sweeteners",B:"Drinks",K:"Snacks"};
var CATS=["All","Vegetables","Fruits","Grains","Protein","Legumes","Dairy","Nuts & Seeds","Condiments","Sweeteners","Drinks","Snacks"];
var RC={g:"#16a34a",a:"#d97706",r:"#dc2626"};
var RBG={g:"#f0fdf4",a:"#fffbeb",r:"#fef2f2"};
var RBR={g:"#bbf7d0",a:"#fde68a",r:"#fecaca"};
var RL={g:"Low FODMAP",a:"Moderate",r:"High FODMAP"};
var RE={g:"✅",a:"⚠️",r:"🔴"};
var FL=["Oligos","Fructose","Polyols","Lactose"];

var foods=D.map(function(d){return{name:d[0],cat:CM[d[1]]||d[1],rating:d[2],serving:d[3],notes:d[4],fodmap:d[5].split(",").map(Number)};});
foods.sort(function(a,b){return a.name.localeCompare(b.name);});

var curCat="All",curFilter="all",curQ="";

document.getElementById("total-count").textContent=foods.length+" foods · Tap any food for details";

// Category pills
var catList=document.getElementById("cat-list");
CATS.forEach(function(c){
  var b=document.createElement("button");
  b.className="cat-pill"+(c==="All"?" on":"");
  b.textContent=c;
  b.onclick=function(){curCat=c;document.getElementById("cat-label").textContent=c==="All"?"All Categories":c;catList.classList.add("hidden");document.getElementById("cat-arrow").textContent="▼";document.querySelectorAll(".cat-pill").forEach(function(p){p.className="cat-pill"+(p.textContent===c?" on":"");});render();};
  catList.appendChild(b);
});

document.getElementById("cat-toggle").onclick=function(){
  var cl=catList.classList;
  if(cl.contains("hidden")){cl.remove("hidden");document.getElementById("cat-arrow").textContent="▲";}
  else{cl.add("hidden");document.getElementById("cat-arrow").textContent="▼";}
};

// Filter buttons
var filterDefs=[["all","All","#6366f1","#eef2ff"],["g","Low","#16a34a","#f0fdf4"],["a","Mod","#d97706","#fffbeb"],["r","High","#dc2626","#fef2f2"]];
var filtersEl=document.getElementById("filters");
filterDefs.forEach(function(fd){
  var b=document.createElement("button");
  b.className="fbtn";b.dataset.key=fd[0];
  b.onclick=function(){curFilter=fd[0];render();};
  filtersEl.appendChild(b);
});

document.getElementById("search").oninput=function(e){curQ=e.target.value.toLowerCase();render();};

function getFiltered(){
  var r=foods;
  if(curCat!=="All")r=r.filter(function(f){return f.cat===curCat;});
  if(curQ)r=r.filter(function(f){return f.name.toLowerCase().indexOf(curQ)!==-1;});
  return r;
}

function render(){
  var base=getFiltered();
  var counts={all:base.length,g:0,a:0,r:0};
  base.forEach(function(f){counts[f.rating]++;});

  // Update filter buttons
  filtersEl.querySelectorAll(".fbtn").forEach(function(b){
    var k=b.dataset.key;
    var def=filterDefs.find(function(d){return d[0]===k;});
    var ct=counts[k]||0;
    b.textContent=def[1]+" ("+ct+")";
    if(curFilter===k){b.style.borderColor=def[2];b.style.borderWidth="2px";b.style.background=def[3];b.style.color=def[2];}
    else{b.style.borderColor="#e2e8f0";b.style.borderWidth="1px";b.style.background="#fff";b.style.color="#94a3b8";}
  });

  var filtered=base;
  if(curFilter!=="all")filtered=base.filter(function(f){return f.rating===curFilter;});

  var list=document.getElementById("list");
  list.innerHTML="";
  if(filtered.length===0){list.innerHTML='<div class="empty">No foods found</div>';return;}

  filtered.forEach(function(f,i){
    var row=document.createElement("button");
    row.className="row";
    row.innerHTML='<div class="dot" style="background:'+RC[f.rating]+'"></div><div style="flex:1;min-width:0"><div class="row-name">'+f.name+'</div>'+(f.serving?'<div class="row-serve">'+f.serving+'</div>':'')+'</div><span class="row-arr">›</span>';
    row.onclick=function(){showDetail(f);};
    list.appendChild(row);
  });
}

function makeDots(val){
  var h='<div class="dots">';
  for(var i=1;i<=3;i++){
    var cls=val>=i?(val>=2?"on"+val:"on1"):"";
    h+='<span class="'+cls+'"></span>';
  }
  return h+'</div>';
}

function showDetail(f){
  document.getElementById("hdr").classList.add("hidden");
  document.getElementById("cat-bar").classList.add("hidden");
  document.getElementById("filters").classList.add("hidden");
  document.getElementById("list").classList.add("hidden");
  document.getElementById("list-footer").classList.add("hidden");
  var d=document.getElementById("detail");
  d.classList.remove("hidden");

  var html='<button class="back-btn" id="back-btn">← Back</button>';
  html+='<div class="detail-card" style="background:'+RBG[f.rating]+';border:1.5px solid '+RBR[f.rating]+'">';
  html+='<div class="detail-head"><span class="detail-emoji">'+RE[f.rating]+'</span><div><div class="detail-name">'+f.name+'</div><div class="detail-rating" style="color:'+RC[f.rating]+'">'+RL[f.rating]+'</div></div></div>';
  html+='<div class="detail-cat">Category: '+f.cat+'</div>';
  if(f.serving)html+='<div class="detail-serve"><b>Safe serving:</b> '+f.serving+'</div>';
  if(f.notes)html+='<div class="detail-notes">'+f.notes+'</div>';
  html+='</div>';

  html+='<div class="breakdown"><div class="breakdown-title">FODMAP Breakdown</div>';
  FL.forEach(function(label,i){
    html+='<div class="brow"><span class="brow-label">'+label+'</span>'+makeDots(f.fodmap[i])+'</div>';
  });
  html+='</div>';

  html+='<div class="disclaimer"><b>Disclaimer</b><p>For educational purposes only. Consult a doctor or dietitian before making changes to your diet.</p></div>';

  d.innerHTML=html;
  d.scrollTop=0;
  document.getElementById("back-btn").onclick=hideDetail;
}

function hideDetail(){
  document.getElementById("detail").classList.add("hidden");
  document.getElementById("hdr").classList.remove("hidden");
  document.getElementById("cat-bar").classList.remove("hidden");
  document.getElementById("filters").classList.remove("hidden");
  document.getElementById("list").classList.remove("hidden");
  document.getElementById("list-footer").classList.remove("hidden");
}

render();
</script>
